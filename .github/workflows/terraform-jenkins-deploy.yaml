name: Terraform Deployment

on:
  push:
    branches:
      - develop
      - nonprod
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - dev
          - nonprod
          - prod
permissions:
  id-token: write
  contents: read

jobs:

# =========================================================
# DEV DEPLOYMENT
# =========================================================

  terraform-dev:
    if: |
      github.ref_name == 'develop' ||
      github.event.inputs.environment == 'dev'

    uses: ./.github/workflows/terraform-jenkins-reusable.yaml

    with:
      environment: dev
      tfvars_file: env/jenkins-dev.tfvars
      backend_config: backend/dev.hcl

    secrets: inherit


# =========================================================
# NONPROD DEPLOYMENT
# =========================================================

  terraform-nonprod:
    if: |
      github.ref_name == 'nonprod' ||
      github.event.inputs.environment == 'nonprod'

    uses: ./.github/workflows/terraform-jenkins-reusable.yaml

    with:
      environment: nonprod
      tfvars_file: env/jenkins-nonprod.tfvars
      backend_config: backend/nonprod.hcl

    secrets: inherit


# =========================================================
# PROD DEPLOYMENT
# =========================================================

  terraform-prod:
    if: |
      github.ref_name == 'main' ||
      github.event.inputs.environment == 'prod'

    uses: ./.github/workflows/terraform-jenkins-reusable.yaml

    with:
      environment: prod
      tfvars_file: env/jenkins-prod.tfvars
      backend_config: backend/prod.hcl

    secrets: inherit
